name: Build macOS

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            core/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('core/Cargo.lock') }}

      - name: Build Rust core library
        working-directory: core
        run: cargo build --release

      - name: Download ffmpeg
        run: |
          chmod +x scripts/download_ffmpeg.sh
          ./scripts/download_ffmpeg.sh

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build macOS app
        run: |
          # Build using xcodebuild
          xcodebuild -project macos/Clippi.xcodeproj \
                     -scheme Clippi \
                     -configuration Release \
                     -derivedDataPath build/ \
                     ONLY_ACTIVE_ARCH=YES \
                     CODE_SIGNING_ALLOWED=NO

      - name: Bundle ffmpeg
        run: |
          mkdir -p build/Build/Products/Release/Clippi.app/Contents/Resources/ffmpeg
          cp ffmpeg/macos-*/ffmpeg build/Build/Products/Release/Clippi.app/Contents/Resources/ffmpeg/
          cp ffmpeg/macos-*/ffprobe build/Build/Products/Release/Clippi.app/Contents/Resources/ffmpeg/
          chmod +x build/Build/Products/Release/Clippi.app/Contents/Resources/ffmpeg/ffmpeg
          chmod +x build/Build/Products/Release/Clippi.app/Contents/Resources/ffmpeg/ffprobe

      - name: Create DMG
        run: |
          mkdir -p dmg-staging
          cp -R build/Build/Products/Release/Clippi.app dmg-staging/
          ln -s /Applications dmg-staging/Applications

          hdiutil create -volname "Clippi" \
                         -srcfolder dmg-staging \
                         -ov -format UDRW \
                         dist/Clippi-rw.dmg

          # Mount and configure window layout
          MOUNT_DIR=$(hdiutil attach dist/Clippi-rw.dmg -readwrite -noverify -noautoopen | grep "/Volumes" | awk '{print $NF}')
          sleep 2

          osascript <<APPLESCRIPT
          tell application "Finder"
            tell disk "Clippi"
              open
              set current view of container window to icon view
              set toolbar visible of container window to false
              set statusbar visible of container window to false
              set bounds of container window to {200, 120, 840, 480}
              set theViewOptions to icon view options of container window
              set arrangement of theViewOptions to not arranged
              set icon size of theViewOptions to 96
              set position of item "Clippi.app" of container window to {160, 180}
              set position of item "Applications" of container window to {480, 180}
              close
              open
              update without registering applications
              delay 2
              close
            end tell
          end tell
          APPLESCRIPT

          hdiutil detach "$MOUNT_DIR" -quiet
          sleep 1

          hdiutil convert dist/Clippi-rw.dmg -format UDZO -imagekey zlib-level=9 -o dist/Clippi-macos.dmg
          rm -f dist/Clippi-rw.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Clippi-macos
          path: dist/

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --notes "Automated build for $GITHUB_REF_NAME"
          gh release upload "$GITHUB_REF_NAME" dist/Clippi-macos.dmg --clobber
