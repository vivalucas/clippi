name: Build Windows

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            core/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('core/Cargo.lock') }}

      - name: Build Rust core library
        working-directory: core
        run: cargo build --release

      - name: Download ffmpeg
        run: .\scripts\download_ffmpeg.ps1

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore NuGet packages
        run: dotnet restore windows/Clippi/Clippi.csproj

      - name: Publish Windows app
        run: dotnet publish windows/Clippi/Clippi.csproj -c Release -p:Platform=x64 -r win-x64 --self-contained -o build/

      - name: Bundle ffmpeg
        run: |
          New-Item -ItemType Directory -Force -Path build\ffmpeg | Out-Null
          Copy-Item -Path ffmpeg\windows-x64\ffmpeg.exe -Destination build\ffmpeg\ -Force
          Copy-Item -Path ffmpeg\windows-x64\ffprobe.exe -Destination build\ffmpeg\ -Force

      - name: Package Windows app
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path build\* -DestinationPath dist\Clippi-windows.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Clippi-windows
          path: dist/

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view $env:GITHUB_REF_NAME
          if ($LASTEXITCODE -ne 0) {
            gh release create $env:GITHUB_REF_NAME --title $env:GITHUB_REF_NAME --notes "Automated build for $env:GITHUB_REF_NAME"
          }
          gh release upload $env:GITHUB_REF_NAME dist\Clippi-windows.zip --clobber
